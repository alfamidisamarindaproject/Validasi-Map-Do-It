<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validator MAP DO IT - Samarinda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .header-banner { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; padding: 30px 0; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card-filter { border: none; border-radius: 12px; margin-top: -20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .table-container { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        thead { background-color: #2a5298; color: white; }
        .checklist-item { font-size: 0.75rem; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; padding: 2px 0; }
        .status-ok { accent-color: #198754; transform: scale(1.3); cursor: pointer; }
        .status-nok { accent-color: #dc3545; transform: scale(1.3); cursor: pointer; }
        .btn-view { background: #0dcaf0; color: white; border: none; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; }
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner-border text-primary" role="status"></div>
    <div class="mt-2 fw-bold">Memproses Data...</div>
</div>

<div class="header-banner text-center">
    <h2 class="fw-bold">VALIDASI MAP DO IT</h2>
    <p class="mb-0 opacity-75">Panel Area Manager & Area Coordinator</p>
</div>

<div class="container-fluid px-4 mt-2">
    <div class="card card-filter p-3 mb-4">
        <div class="row g-3">
            <div class="col-md-3">
                <label class="small fw-bold text-muted">CARI NAMA</label>
                <input type="text" id="filterNama" class="form-control" placeholder="Ketik nama...">
            </div>
            <div class="col-md-3">
                <label class="small fw-bold text-muted">KODE TOKO</label>
                <input type="text" id="filterToko" class="form-control" placeholder="Contoh: SAM01">
            </div>
            <div class="col-md-3">
                <label class="small fw-bold text-muted">TANGGAL</label>
                <input type="date" id="filterTanggal" class="form-control">
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <button class="btn btn-primary w-100 fw-bold" onclick="loadData()">🔄 REFRESH DATA</button>
            </div>
        </div>
    </div>

    <div class="table-container mb-5">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th>Waktu</th>
                        <th>Nama</th>
                        <th>Toko</th>
                        <th>Rak</th>
                        <th width="180">Checklist</th>
                        <th>Foto</th>
                        <th class="text-center">Validasi (OK / NOK)</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="7" class="text-center py-5 text-muted">Klik Refresh untuk memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="fotoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0">
            <div class="modal-body p-0">
                <img src="" id="imgPreview" class="w-100 rounded shadow">
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
