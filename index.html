<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Validasi MAP DO IT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; font-family: 'Inter', sans-serif; }
        .header-section { background: #1e3c72; color: white; padding: 25px 0; border-radius: 0 0 20px 20px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .table-custom thead { background: #2a5298; color: white; font-size: 0.8rem; }
        
        /* Checklist Box */
        .checklist-box { background: #fdfdfd; border: 1px solid #eee; border-radius: 6px; padding: 5px 10px; min-width: 130px; }
        .check-v { color: #198754; font-weight: bold; }
        .check-x { color: #dc3545; font-weight: bold; }

        /* Custom Checkbox OK/NOK */
        .cb-ok { accent-color: #198754; transform: scale(1.4); cursor: pointer; }
        .cb-nok { accent-color: #dc3545; transform: scale(1.4); cursor: pointer; }
        
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); z-index: 9999; justify-content: center; align-items: center; }
        #img-modal-target { width: 100%; border-radius: 8px; }
    </style>
</head>
<body>

<div id="loading-screen" class="loading-overlay"><div class="spinner-border text-primary"></div></div>

<div class="header-section text-center">
    <h3 class="fw-bold">VALIDASI MAP DO IT</h3>
    <p class="small opacity-75">Area Coordinator & Area Manager Portal</p>
</div>

<div class="container-fluid mt-4 px-4">
    <div class="card p-3 mb-4">
        <div class="row g-2">
            <div class="col-md-3">
                <input type="text" id="filter-nama" class="form-control" placeholder="Cari Personil...">
            </div>
            <div class="col-md-3">
                <input type="text" id="filter-toko" class="form-control" placeholder="Cari Kode Toko...">
            </div>
            <div class="col-md-3">
                <input type="date" id="filter-tanggal" class="form-control">
            </div>
            <div class="col-md-3">
                <button class="btn btn-primary w-100 fw-bold" onclick="loadData()">🔄 SINKRON DATA</button>
            </div>
        </div>
    </div>

    <div class="card overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Waktu</th>
                        <th>Nama</th>
                        <th>Toko</th>
                        <th>Rak</th>
                        <th>Checklist</th>
                        <th>Foto</th>
                        <th class="text-center">Validasi AM (OK / NOK)</th>
                    </tr>
                </thead>
                <tbody id="data-table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="fotoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0">
            <div class="modal-body p-1 text-center bg-dark">
                <img src="" id="img-modal-target">
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
