<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validasi MAP DO IT - Samarinda System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .header-section { 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); 
            color: white; padding: 40px 0; border-radius: 0 0 30px 30px; margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .card { border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .table-custom thead { background-color: #2a5298; color: white; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
        .table-custom tbody td { vertical-align: middle; padding: 15px 10px; }
        
        /* Checklist Style */
        .checklist-box {
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 8px 12px;
            min-width: 150px;
        }
        .checklist-item { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 2px; }
        .check-v { color: #28a745; font-weight: bold; }
        .check-x { color: #dc3545; font-weight: bold; }

        .btn-view { 
            background-color: #17a2b8; color: white; border: none; font-size: 0.75rem; 
            border-radius: 20px; padding: 6px 16px; font-weight: 600; transition: 0.3s;
        }
        .btn-view:hover { background-color: #138496; transform: scale(1.05); }
        .select-status { border: 2px solid #2a5298; border-radius: 8px; font-weight: 600; font-size: 0.85rem; }
        
        #img-modal-target { width: 100%; border-radius: 10px; display: none; }
        .loading-spinner { display: none; text-align: center; padding: 50px; }
    </style>
</head>
<body>

<div class="header-section text-center">
    <h2 class="fw-bold">VALIDASI MAP DO IT</h2>
    <p class="mb-0 opacity-75">Area Coordinator & Area Manager Samarinda Portal</p>
</div>

<div class="container-fluid px-4">
    <div class="card p-4 mb-4">
        <div class="row align-items-end">
            <div class="col-md-3 mb-2">
                <label class="form-label fw-bold small text-secondary">NAMA VALIDATOR</label>
                <input type="text" id="validator-name" class="form-control" placeholder="Nama Anda">
            </div>
            <div class="col-md-3 mb-2">
                <label class="form-label fw-bold small text-secondary">KODE TOKO</label>
                <input type="text" id="store-code" class="form-control" placeholder="Contoh: SAM01">
            </div>
            <div class="col-md-3 mb-2">
                <label class="form-label fw-bold small text-secondary">TANGGAL</label>
                <input type="date" id="validation-date" class="form-control">
            </div>
            <div class="col-md-3 mb-2 text-md-end">
                <button class="btn btn-primary rounded-pill px-4 fw-bold" id="refresh-btn">
                    🔄 Sinkronkan Data
                </button>
            </div>
        </div>
    </div>

    <div class="card overflow-hidden mb-5">
        <div class="table-responsive">
            <table class="table table-hover table-custom mb-0">
                <thead>
                    <tr>
                        <th>Waktu</th>
                        <th>Personil</th>
                        <th>Toko</th>
                        <th>Rak</th>
                        <th>Detail Checklist (DO IT)</th>
                        <th>Bukti Foto</th>
                        <th class="text-center">Aksi Validasi</th>
                    </tr>
                </thead>
                <tbody id="data-table-body">
                    </tbody>
            </table>
            
            <div id="loading" class="loading-spinner">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 fw-bold text-muted">Menghubungkan ke Google Sheets...</p>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="fotoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 bg-transparent">
            <div class="modal-header border-0 p-0 mb-2">
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-0 text-center">
                <div id="loading-foto" class="py-5"><div class="spinner-border text-light"></div></div>
                <img src="" id="img-modal-target" alt="Bukti Foto">
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
