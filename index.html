<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validasi MAP DO IT - Samarinda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; color: #333; }
        .header-section { 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); 
            color: white; padding: 30px 0; border-radius: 0 0 25px 25px; margin-bottom: 30px;
        }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .table-custom thead { background-color: #2a5298; color: white; }
        .table-custom tbody td { vertical-align: middle; font-size: 0.85rem; }
        .btn-view { 
            background-color: #17a2b8; color: white; border: none; font-size: 0.75rem; 
            border-radius: 20px; padding: 6px 16px; font-weight: 600; cursor: pointer;
        }
        .select-status { border: 2px solid #2a5298; border-radius: 8px; font-weight: 600; }
        .loading-spinner { display: none; text-align: center; padding: 40px; }
        #img-modal-target { width: 100%; border-radius: 8px; display: none; }
    </style>
</head>
<body>

<div class="header-section text-center">
    <h2>VALIDASI MAP DO IT ONLINE</h2>
    <p class="mb-0 text-white-50">Panel Kendali Area Coordinator & Area Manager</p>
</div>

<div class="container-fluid px-4">
    <div class="row justify-content-center">
        <div class="col-lg-12">
            
            <div class="card p-4 mb-4">
                <div class="row align-items-end">
                    <div class="col-md-3 mb-3">
                        <label class="form-label fw-bold small text-muted">NAMA VALIDATOR</label>
                        <input type="text" id="validator-name" class="form-control" placeholder="Nama AC / AM">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label fw-bold small text-muted">KODE TOKO</label>
                        <input type="text" id="store-code" class="form-control" placeholder="SAM01">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label fw-bold small text-muted">TANGGAL VALIDASI</label>
                        <input type="date" id="validation-date" class="form-control">
                    </div>
                    <div class="col-md-3 mb-3 text-end">
                        <button class="btn btn-outline-primary rounded-pill px-4 fw-bold" id="refresh-btn">
                            🔄 Sinkronkan GSheet
                        </button>
                    </div>
                </div>
            </div>

            <div class="card p-0 mb-4 overflow-hidden">
                <div class="table-responsive">
                    <table class="table table-hover table-custom mb-0 text-nowrap">
                        <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>Nama Personil</th>
                                <th>Toko</th>
                                <th>Rak</th>
                                <th>Detail Checklist</th>
                                <th>Bukti Foto</th>
                                <th class="text-center">Validasi AM/AC</th>
                            </tr>
                        </thead>
                        <tbody id="data-table-body"></tbody>
                    </table>
                    <div id="loading" class="loading-spinner">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-2 text-muted fw-bold">Memuat data...</p>
                    </div>
                </div>
            </div>

            <div class="card p-4 mb-5">
                <label class="form-label fw-bold small text-muted">CATATAN & ACTION PLAN STRATEGIS</label>
                <textarea id="feedback-note" class="form-control mb-3" rows="3"></textarea>
                <div class="text-end">
                    <button type="button" class="btn btn-primary px-5 py-2 fw-bold" style="background-color: #1e3c72; border: none;">
                        SIMPAN VALIDASI
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="fotoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 bg-transparent">
            <div class="modal-header border-0 p-0 mb-2">
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-0 text-center">
                <div id="loading-foto" class="py-5"><div class="spinner-border text-light"></div></div>
                <img src="" id="img-modal-target" alt="Pratinjau">
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
