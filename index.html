<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validator MAP DO IT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-bottom: 120px; font-family: 'Segoe UI', sans-serif; }
        .header-blue { background: #2a5298; color: white; padding: 40px 0 60px 0; border-radius: 0 0 20px 20px; }
        .filter-card { border: none; border-radius: 12px; margin-top: -45px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .table-container { background: white; border-radius: 12px; margin-top: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; }
        
        /* Checklist Box Improved */
        .checklist-box { background: #fff; border: 1px solid #dee2e6; border-radius: 8px; padding: 8px; min-width: 180px; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05); }
        .checklist-item { font-size: 0.8rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f1f1; padding: 3px 0; }
        .checklist-item:last-child { border-bottom: none; }
        .status-badge { font-weight: bold; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; }
        .bg-ok { background: #e8f5e9; color: #2e7d32; }
        .bg-nok { background: #ffebee; color: #c62828; }
        
        /* Custom Checkbox */
        .cb-ok { accent-color: #198754; transform: scale(1.6); cursor: pointer; }
        .cb-nok { accent-color: #dc3545; transform: scale(1.6); cursor: pointer; }
        
        .submit-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); z-index: 1000; display: none; }
        
        #loading-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.9); z-index: 9999; 
            display: none; justify-content: center; align-items: center; flex-direction: column; 
        }
        #frameFoto { max-height: 80vh; border-radius: 8px; border: 5px solid white; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner-border text-primary" style="width: 3.5rem; height: 3.5rem;"></div>
    <p class="mt-3 fw-bold text-primary">Sinkronisasi Data GSheet...</p>
</div>

<div class="header-blue text-center">
    <h2 class="fw-bold">VALIDASI MAP DO IT</h2>
    <p class="opacity-75">Panel Area Manager & Area Coordinator</p>
</div>

<div class="container-fluid px-4">
    <div class="card filter-card p-4">
        <div class="row g-3">
            <div class="col-md-3">
                <label class="small fw-bold text-muted mb-1">CARI NAMA</label>
                <input type="text" id="inputNama" class="form-control" placeholder="Nama personil...">
            </div>
            <div class="col-md-3">
                <label class="small fw-bold text-muted mb-1">KODE TOKO</label>
                <input type="text" id="inputToko" class="form-control" placeholder="Kode Toko...">
            </div>
            <div class="col-md-3">
                <label class="small fw-bold text-muted mb-1">TANGGAL</label>
                <input type="date" id="inputTanggal" class="form-control">
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <button class="btn btn-primary w-100 fw-bold shadow-sm" onclick="fetchData()">🔄 REFRESH DATA</button>
            </div>
        </div>
    </div>

    <div class="table-container mb-5">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th style="min-width: 100px;">Waktu</th>
                        <th>Nama</th>
                        <th>Toko</th>
                        <th>Rak</th>
                        <th style="min-width: 200px;">Checklist Detail</th>
                        <th>Foto</th>
                        <th class="text-center">Validasi AM/AC</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="7" class="text-center py-5 text-muted">Memulai koneksi...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="submit-bar" id="submitBar">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="fw-bold text-primary fs-5"><span id="countSelected">0</span> Item Dipilih</div>
        <button class="btn btn-success px-5 py-2 fw-bold rounded-pill shadow" onclick="kirimData()">✅ SIMPAN VALIDASI</button>
    </div>
</div>

<div class="modal fade" id="modalFoto" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 bg-transparent">
            <div class="modal-header border-0 p-0 mb-2 justify-content-end">
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-0 text-center">
                <div id="loadingGambar" class="text-white py-5"><div class="spinner-border"></div></div>
                <img src="" id="frameFoto" class="img-fluid shadow-lg" style="display:none;">
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
