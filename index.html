<div class="card p-4 mb-4">
    <div class="row g-3">
        <div class="col-md-3">
            <label class="filter-label">NAMA PERSONIL</label>
            <input type="text" id="filter-nama" class="form-control" placeholder="Cari nama...">
        </div>
        <div class="col-md-3">
            <label class="filter-label">KODE TOKO</label>
            <input type="text" id="filter-toko" class="form-control" placeholder="Cari kode toko...">
        </div>
        <div class="col-md-3">
            <label class="filter-label">TANGGAL</label>
            <input type="date" id="filter-tanggal" class="form-control">
        </div>
        <div class="col-md-3 d-flex align-items-end">
            <button class="btn btn-primary w-100 rounded-pill fw-bold" id="refresh-btn">🔄 Refresh Data</button>
        </div>
    </div>
</div>

<div class="card overflow-hidden">
    <div class="table-responsive">
        <table class="table table-hover table-custom mb-0">
            <thead>
                <tr>
                    <th>Waktu</th>
                    <th>Nama</th>
                    <th>Toko</th>
                    <th>Rak</th>
                    <th>Checklist</th>
                    <th>Foto</th>
                    <th class="text-center">Validasi AM</th> </tr>
            </thead>
            <tbody id="data-table-body">
                </tbody>
        </table>
    </div>
</div>
