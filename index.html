<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validasi MAP DO IT - Area Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .header-section { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; padding: 30px 0; border-radius: 0 0 25px 25px; margin-bottom: 30px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .table-custom thead { background-color: #2a5298; color: white; }
        .table-custom tbody td { vertical-align: middle; font-size: 0.85rem; }
        .btn-view { background-color: #17a2b8; color: white; border: none; font-size: 0.75rem; border-radius: 20px; padding: 6px 16px; cursor: pointer; }
        .btn-view:hover { background-color: #138496; }
        .loading-spinner { display: none; text-align: center; padding: 30px; }
        #img-modal-target { width: 100%; border-radius: 8px; display: none; }
    </style>
</head>
<body>

<div class="header-section text-center">
    <h2>VALIDASI MAP DO IT ONLINE</h2>
    <p class="mb-0 text-white-50">Panel Khusus Area Coordinator & Area Manager</p>
</div>

<div class="container-fluid px-4">
    <div class="row justify-content-center">
        <div class="col-lg-12">
            
            <div class="card p-4 mb-4">
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold small">NAMA VALIDATOR</label>
                        <input type="text" id="validator-name" class="form-control" placeholder="Nama AC / AM">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold small">KODE TOKO</label>
                        <input type="text" id="store-code" class="form-control" placeholder="Contoh: SAM01">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold small">TANGGAL VALIDASI</label>
                        <input type="date" id="validation-date" class="form-control">
                    </div>
                </div>
            </div>

            <div class="card p-0 mb-4 overflow-hidden">
                <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 fw-bold text-primary">Data Temuan GSheet</h5>
                    <button class="btn btn-sm btn-outline-primary rounded-pill" onclick="loadData()">Refresh Data</button>
                </div>
                
                <div class="table-responsive">
                    <table class="table table-hover table-custom mb-0">
                        <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>Personil</th>
                                <th>Toko</th>
                                <th>Rak</th>
                                <th>Checklist</th>
                                <th>Bukti Foto</th>
                                <th class="text-center">Validasi</th>
                            </tr>
                        </thead>
                        <tbody id="data-table-body"></tbody>
                    </table>
                    <div id="loading" class="loading-spinner">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-2 text-muted small">Sedang menarik data...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="fotoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0">
            <div class="modal-header border-0 bg-light">
                <h6 class="modal-title fw-bold">Pratinjau Foto</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-1 text-center bg-dark" style="min-height: 200px;">
                <div id="loading-foto" class="py-5">
                    <div class="spinner-border text-light" role="status"></div>
                </div>
                <img src="" id="img-modal-target" alt="Bukti Lapangan">
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
